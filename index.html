<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Detect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #64748b;
      margin-bottom: 12px;
    }
    .browser-name {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 32px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    pre {
      background: #0f172a;
      border-radius: 10px;
      padding: 20px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.6;
      color: #94a3b8;
      border: 1px solid #334155;
    }
    .key { color: #7dd3fc; }
    .string { color: #86efac; }
    .bool { color: #fbbf24; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Detected Browser</h1>
    <div class="browser-name" id="browserName">Detecting...</div>
    <pre id="json"></pre>
  </div>
  <script>
    function detect() {
      const ua = navigator.userAgent;
      const info = {
        browser: 'Unknown',
        version: '',
        engine: '',
        os: '',
        platform: navigator.platform || '',
        mobile: /Mobi|Android/i.test(ua),
        userAgent: ua
      };

      // Order matters — check more specific browsers first
      const browsers = [
        ['Opera',    /OPR\/(\d+[\d.]*)/],
        ['Edge',     /Edg\/(\d+[\d.]*)/],
        ['Samsung',  /SamsungBrowser\/(\d+[\d.]*)/],
        ['Brave',    /Brave\/(\d+[\d.]*)|Chrome\/(\d+[\d.]*)/, () => navigator.brave && navigator.brave.isBrave],
        ['Vivaldi',  /Vivaldi\/(\d+[\d.]*)/],
        ['Firefox',  /Firefox\/(\d+[\d.]*)/],
        ['Safari',   /Version\/(\d+[\d.]*).*Safari/],
        ['Chrome',   /Chrome\/(\d+[\d.]*)/],
      ];

      for (const [name, re, extra] of browsers) {
        const m = ua.match(re);
        if (m) {
          if (name === 'Brave') {
            if (extra && extra()) {
              info.browser = 'Brave';
              info.version = m[1] || m[2] || '';
              break;
            }
            continue;
          }
          info.browser = name;
          info.version = m[1] || '';
          break;
        }
      }

      // Check Brave async (it exposes a promise)
      if (info.browser === 'Chrome' && navigator.brave && typeof navigator.brave.isBrave === 'function') {
        navigator.brave.isBrave().then(isBrave => {
          if (isBrave) {
            info.browser = 'Brave';
            render(info);
          }
        });
      }

      // Engine
      if (/Gecko\//.test(ua)) info.engine = 'Gecko';
      else if (/AppleWebKit\//.test(ua)) info.engine = 'WebKit';
      else if (/Trident\//.test(ua)) info.engine = 'Trident';

      // OS
      const osPatterns = [
        ['Windows', /Windows NT (\d+\.\d+)/],
        ['macOS',   /Mac OS X ([\d_]+)/],
        ['iOS',     /iPhone OS ([\d_]+)/],
        ['Android', /Android ([\d.]+)/],
        ['Linux',   /Linux/],
      ];
      for (const [name, re] of osPatterns) {
        const m = ua.match(re);
        if (m) {
          info.os = m[1] ? name + ' ' + m[1].replace(/_/g, '.') : name;
          break;
        }
      }

      return info;
    }

    function render(info) {
      document.getElementById('browserName').textContent = info.browser + (info.version ? ' ' + info.version : '');

      const json = JSON.stringify(info, null, 2);
      const highlighted = json
        .replace(/"(\w+)":/g, '<span class="key">"$1"</span>:')
        .replace(/: "(.*?)"/g, ': <span class="string">"$1"</span>')
        .replace(/: (true|false)/g, ': <span class="bool">$1</span>');
      document.getElementById('json').innerHTML = highlighted;
    }

    render(detect());
  </script>
</body>
</html>
