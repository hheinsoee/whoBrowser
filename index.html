<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Detect — Native</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Detected Browser</h1>
  <div class="browser-name" id="browserName">Detecting...</div>
  <h2 id="fingerprint"></h2>
  <div class="inapp-warning" id="inappWarning">
    <p>You are in <span class="app-name" id="appName"></span>'s in-app browser. Google Sign-In may not work here.</p>
    <a class="open-browser-btn" id="openBrowserBtn">Open in Browser</a>
    <button class="copy-btn" id="copyUrlBtn" style="margin-left: 8px;">Copy URL</button>
  </div>
  <div class="bar">
    <span>UA + JS detection (no dependencies)</span>
    <button class="copy-btn" id="copyJsonBtn">Copy JSON</button>
  </div>
  <pre id="json"></pre>

  <script src="shared.js"></script>
  <script>
    var ua = navigator.userAgent;
    var browser = { name: "Unknown", version: "", engine: "" };
    var browsers = [
      ["LINE",           /\bLine\/(\d+[\d.]*)/i],
      ["Facebook",       /\bFB[\w]*\/(\d+[\d.]*)|FBAN|FBAV/i],
      ["Instagram",      /\bInstagram[\s/](\d+[\d.]*)/i],
      ["Twitter",        /\bTwitter[\s/](\d+[\d.]*)/i],
      ["TikTok",         /\bBytedance|ByteLocale|musical_ly|TikTok[\s/](\d+[\d.]*)/i],
      ["Telegram",       /\bTelegramBot|Telegram[\s/](\d+[\d.]*)/i],
      ["WeChat",         /\bMicroMessenger\/(\d+[\d.]*)/i],
      ["KakaoTalk",      /\bKAKAOTALK[\s/](\d+[\d.]*)/i],
      ["Snapchat",       /\bSnapchat[\s/](\d+[\d.]*)/i],
      ["Discord",        /\bDiscord[\s/](\d+[\d.]*)/i],
      ["Slack",          /\bSlack[\s/](\d+[\d.]*)/i],
      ["Pinterest",      /\bPinterest[\s/](\d+[\d.]*)/i],
      ["LinkedIn",       /\bLinkedIn[\s/](\d+[\d.]*)/i],
      ["WhatsApp",       /\bWhatsApp\/(\d+[\d.]*)/i],
      ["Zalo",           /\bZalo[\s/](\d+[\d.]*)/i],
      ["Viber",          /\bViber\/(\d+[\d.]*)/i],
      ["Naver",          /\bNAVER[\s/(](\d+[\d.]*)/i],
      ["Daum",           /\bDaumApps\/(\d+[\d.]*)/i],
      ["Reddit",         /\breddit[\s/](\d+[\d.]*)/i],
      ["Threads",        /\bBarcelona[\s/](\d+[\d.]*)/i],
      ["Messenger",      /\bMessenger[\s/](\d+[\d.]*)/i],
      ["Google App",     /\bGSA\/(\d+[\d.]*)/],
      ["Google News",    /\bGoogleNews[\s/](\d+[\d.]*)/i],
      ["YouTube",        /\bcom\.google\.android\.youtube|YTApp[\s/](\d+[\d.]*)/i],
      ["Shopee",         /\bShopee[\s/](\d+[\d.]*)/i],
      ["Lazada",         /\bLazada[\s/](\d+[\d.]*)/i],
      ["Grab",           /\bGrab[\s/](\d+[\d.]*)/i],
      ["PayPay",         /\bPayPay[\s/](\d+[\d.]*)/i],
      ["Alipay",         /\bAlipayClient\/(\d+[\d.]*)/i],
      ["QQ",             /\bQQ\/(\d+[\d.]*)/i],
      ["Weibo",          /\bWeibo.*__(\d+[\d.]*)/i],
      ["Douyin",         /\bAweme[\s/](\d+[\d.]*)/i],
      ["Baidu",          /\bbaiduboxapp\/(\d+[\d.]*)|bdbrowser/i],
      ["Opera GX",      /OPR\/(\d+[\d.]*).*GX/],
      ["Opera",          /OPR\/(\d+[\d.]*)/],
      ["Opera Touch",    /OPT\/(\d+[\d.]*)/],
      ["Edge",           /Edg\/(\d+[\d.]*)/],
      ["Samsung",        /SamsungBrowser\/(\d+[\d.]*)/],
      ["Vivaldi",        /Vivaldi\/(\d+[\d.]*)/],
      ["Brave",          /Brave\/(\d+[\d.]*)/],
      ["Arc",            /Arc\/(\d+[\d.]*)/],
      ["Whale",          /Whale\/(\d+[\d.]*)/],
      ["Yandex",         /YaBrowser\/(\d+[\d.]*)/],
      ["UC Browser",     /UCBrowser\/(\d+[\d.]*)/],
      ["Puffin",         /Puffin\/(\d+[\d.]*)/],
      ["Dolphin",        /Dolphin\/(\d+[\d.]*)/],
      ["Maxthon",        /Maxthon\/(\d+[\d.]*)/],
      ["Waterfox",       /Waterfox\/(\d+[\d.]*)/],
      ["Pale Moon",      /PaleMoon\/(\d+[\d.]*)/],
      ["Basilisk",       /Basilisk\/(\d+[\d.]*)/],
      ["Tor",            /Tor[\s/]|Gecko.*Firefox.*rv:/i],
      ["DuckDuckGo",     /DuckDuckGo\/(\d+[\d.]*)/],
      ["Huawei Browser", /HuaweiBrowser\/(\d+[\d.]*)/],
      ["Mi Browser",     /MiuiBrowser\/(\d+[\d.]*)/],
      ["Silk",           /Silk\/(\d+[\d.]*)/],
      ["Ecosia",         /Ecosia[\s/](\d+[\d.]*)/i],
      ["Kiwi",           /Kiwi[\s/](\d+[\d.]*)/i],
      ["Bromite",        /Bromite[\s/](\d+[\d.]*)/i],
      ["Sleipnir",       /Sleipnir\/(\d+[\d.]*)/],
      ["Lunascape",      /Lunascape\/(\d+[\d.]*)/],
      ["Avant",          /Avant[\s/](\d+[\d.]*)/i],
      ["Epiphany",       /Epiphany\/(\d+[\d.]*)/],
      ["Konqueror",      /Konqueror\/(\d+[\d.]*)/],
      ["Falkon",         /Falkon\/(\d+[\d.]*)/],
      ["Midori",         /Midori\/(\d+[\d.]*)/],
      ["Lynx",           /Lynx\/(\d+[\d.]*)/],
      ["Googlebot",      /Googlebot\/(\d+[\d.]*)/],
      ["Bingbot",        /bingbot\/(\d+[\d.]*)/],
      ["WebView",        /; wv\)/],
      ["Firefox",        /Firefox\/(\d+[\d.]*)/],
      ["Safari",         /Version\/(\d+[\d.]*).*Safari/],
      ["Chrome",         /Chrome\/(\d+[\d.]*)/],
    ];
    for (var i = 0; i < browsers.length; i++) {
      var m = ua.match(browsers[i][1]);
      if (m) { browser.name = browsers[i][0]; browser.version = m[1] || ""; break; }
    }

    // JS object fallbacks
    if (browser.name === "Chrome" || browser.name === "Safari" || browser.name === "Unknown") {
      if (window.Telegram || window.TelegramWebviewProxy) browser.name = "Telegram";
      else if (window.FB || window.FBAV || document.referrer.includes("facebook.com")) browser.name = "Facebook";
      else if (window.__igApiUrl || document.referrer.includes("instagram.com")) browser.name = "Instagram";
    }

    if (/Gecko\//.test(ua)) browser.engine = "Gecko";
    else if (/AppleWebKit\//.test(ua)) browser.engine = "WebKit";
    else if (/Trident\//.test(ua)) browser.engine = "Trident";

    var IN_APP = [
      "LINE","Facebook","Instagram","Twitter","TikTok","Telegram",
      "WeChat","KakaoTalk","Snapchat","Discord","Slack","Pinterest",
      "LinkedIn","WhatsApp","Zalo","Viber","Naver","Daum","Reddit",
      "Threads","Messenger","Google App","Google News","YouTube",
      "Shopee","Lazada","Grab","PayPay","Alipay","QQ","Weibo",
      "Douyin","Baidu","WebView"
    ];

    var os = { name: "Unknown", version: "" };
    var osP = [
      ["Windows", /Windows NT ([\d.]+)/], ["macOS", /Mac OS X ([\d_]+)/],
      ["iOS", /iPhone OS ([\d_]+)/], ["iPadOS", /iPad.*OS ([\d_]+)/],
      ["Android", /Android ([\d.]+)/], ["Chrome OS", /CrOS/], ["Linux", /Linux/],
    ];
    for (var i = 0; i < osP.length; i++) {
      var m = ua.match(osP[i][1]);
      if (m) { os.name = osP[i][0]; os.version = m[1] ? m[1].replace(/_/g, ".") : ""; break; }
    }

    var s = window.screen;
    var now = new Date();
    var conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;

    var gpu = null;
    try {
      var c = document.createElement("canvas");
      var gl = c.getContext("webgl") || c.getContext("experimental-webgl");
      if (gl) {
        var dbg = gl.getExtension("WEBGL_debug_renderer_info");
        gpu = {
          vendor: dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR),
          renderer: dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER)
        };
      }
    } catch (e) {}

    var info = {
      browser: browser,
      os: os,
      screen: { width: s.width, height: s.height, availWidth: s.availWidth, availHeight: s.availHeight, colorDepth: s.colorDepth, pixelRatio: window.devicePixelRatio || 1, orientation: (s.orientation && s.orientation.type) || "" },
      window: { innerWidth: window.innerWidth, innerHeight: window.innerHeight, outerWidth: window.outerWidth, outerHeight: window.outerHeight },
      locale: {
        language: navigator.language || "",
        languages: navigator.languages ? Array.from(navigator.languages) : [],
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
        timezoneOffset: now.getTimezoneOffset(),
        dateFormat: new Intl.DateTimeFormat(navigator.language, { dateStyle: "full" }).format(now),
        numberFormat: new Intl.NumberFormat(navigator.language).format(1234567.89),
        currency: (function () { try { return new Intl.NumberFormat(navigator.language, { style: "currency", currency: "USD" }).format(1234.5); } catch (e) { return ""; } })()
      },
      hardware: { cores: navigator.hardwareConcurrency || null, memory: navigator.deviceMemory || null, maxTouchPoints: navigator.maxTouchPoints || 0, platform: navigator.platform || "", mobile: /Mobi|Android/i.test(ua) },
      network: conn ? { effectiveType: conn.effectiveType || "", downlink: conn.downlink || null, rtt: conn.rtt || null, saveData: conn.saveData || false } : null,
      gpu: gpu,
      media: { cookiesEnabled: navigator.cookieEnabled, doNotTrack: navigator.doNotTrack || null, pdfViewerEnabled: navigator.pdfViewerEnabled || null, webdriver: navigator.webdriver || false, online: navigator.onLine },
      features: {
        serviceWorker: "serviceWorker" in navigator,
        webGL: (function () { try { return !!document.createElement("canvas").getContext("webgl"); } catch (e) { return false; } })(),
        webGL2: (function () { try { return !!document.createElement("canvas").getContext("webgl2"); } catch (e) { return false; } })(),
        webRTC: !!(window.RTCPeerConnection || window.webkitRTCPeerConnection),
        webSocket: "WebSocket" in window, webWorker: "Worker" in window,
        notifications: "Notification" in window, geolocation: "geolocation" in navigator,
        bluetooth: "bluetooth" in navigator, usb: "usb" in navigator,
        clipboard: "clipboard" in navigator, share: "share" in navigator,
        indexedDB: "indexedDB" in window, webGPU: "gpu" in navigator
      },
      userAgent: ua
    };

    // Render
    var isInApp = IN_APP.indexOf(browser.name) !== -1;
    document.getElementById("browserName").textContent = browser.name + (browser.version ? " " + browser.version : "");
    document.getElementById("fingerprint").textContent = browser.name;
    if (isInApp) showWarning(browser.name);

    var json = JSON.stringify(info, null, 2);
    document.getElementById("json").innerHTML = highlight(json);
    copyBtn("copyJsonBtn", json);

    // Brave async
    if (browser.name === "Chrome" && navigator.brave && typeof navigator.brave.isBrave === "function") {
      navigator.brave.isBrave().then(function (yes) {
        if (yes) {
          info.browser.name = "Brave";
          document.getElementById("browserName").textContent = "Brave " + browser.version;
          document.getElementById("fingerprint").textContent = "Brave";
          var j = JSON.stringify(info, null, 2);
          document.getElementById("json").innerHTML = highlight(j);
          copyBtn("copyJsonBtn", j);
        }
      });
    }

    // Battery async
    if (navigator.getBattery) {
      navigator.getBattery().then(function (b) {
        info.battery = {
          charging: b.charging, level: Math.round(b.level * 100) + "%",
          chargingTime: b.chargingTime === Infinity ? "N/A" : b.chargingTime + "s",
          dischargingTime: b.dischargingTime === Infinity ? "N/A" : b.dischargingTime + "s"
        };
        var j = JSON.stringify(info, null, 2);
        document.getElementById("json").innerHTML = highlight(j);
        copyBtn("copyJsonBtn", j);
      }).catch(function () {});
    }
  </script>
</body>
</html>
